{% extends "base.html" %}

{% block title %}发布书籍 - CampusBook{% endblock %}

{% block content %}
<div class="auth-form" style="max-width: 600px;">
    <h1>发布书籍</h1>
    <form method="POST" action="{{ url_for('new_book') }}" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">书名 *</label>
            <input type="text" id="title" name="title" required>
        </div>
        <div class="form-group">
            <label for="author">作者</label>
            <input type="text" id="author" name="author">
        </div>
        <div class="form-group">
            <label for="isbn">ISBN</label>
            <input type="text" id="isbn" name="isbn">
        </div>
        <div class="form-group">
            <label for="category">分类 *</label>
            <select id="category" name="category" required>
                <option value="">请选择分类</option>
                {% for cat in categories %}
                <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="price">价格 (元) *</label>
            <input type="number" id="price" name="price" step="0.01" min="0" required>
        </div>
        <div class="form-group">
            <label for="condition">新旧程度</label>
            <select id="condition" name="condition">
                {% for c in conditions %}
                <option value="{{ c }}">{{ c }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="description">书籍描述</label>
            <textarea id="description" name="description" rows="5" placeholder="请描述书籍的情况..."></textarea>
        </div>
        <div class="form-group">
            <label for="image">书籍图片</label>
            <input type="file" id="image" name="image" accept="image/*">
        </div>
        <button type="submit" class="btn-submit">发布书籍</button>
    </form>
</div>
{% endblock %}
