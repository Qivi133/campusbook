{% extends "base.html" %}

{% block title %}编辑书籍 - CampusBook{% endblock %}

{% block content %}
<div class="auth-form" style="max-width: 600px;">
    <h1>编辑书籍</h1>
    <form method="POST" action="{{ url_for('edit_book', book_id=book.id) }}" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">书名 *</label>
            <input type="text" id="title" name="title" value="{{ book.title }}" required>
        </div>
        <div class="form-group">
            <label for="author">作者</label>
            <input type="text" id="author" name="author" value="{{ book.author or '' }}">
        </div>
        <div class="form-group">
            <label for="isbn">ISBN</label>
            <input type="text" id="isbn" name="isbn" value="{{ book.isbn or '' }}">
        </div>
        <div class="form-group">
            <label for="category">分类 *</label>
            <select id="category" name="category" required>
                {% for cat in categories %}
                <option value="{{ cat }}" {% if book.category == cat %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="price">价格 (元) *</label>
            <input type="number" id="price" name="price" step="0.01" min="0" value="{{ book.price }}" required>
        </div>
        <div class="form-group">
            <label for="condition">新旧程度</label>
            <select id="condition" name="condition">
                {% for c in conditions %}
                <option value="{{ c }}" {% if book.condition == c %}selected{% endif %}>{{ c }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="description">书籍描述</label>
            <textarea id="description" name="description" rows="5">{{ book.description or '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="image">更换图片</label>
            <input type="file" id="image" name="image" accept="image/*">
            {% if book.image_url %}
            <p style="margin-top: 10px;">当前图片: {{ book.image_url }}</p>
            {% endif %}
        </div>
        <button type="submit" class="btn-submit">保存修改</button>
    </form>
</div>
{% endblock %}
